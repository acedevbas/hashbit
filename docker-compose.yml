services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # only expose on localhost — not reachable from outside the host
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker"]
      interval: 5s
      timeout: 5s
      retries: 20
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tracker:${POSTGRES_PASSWORD}@db:5432/tracker?sslmode=disable
      HTTP_ADDR: ":8080"
      USER_AGENT: "uTorrent/3.5.5"

      # REQUIRED: auth token for API. Generate with: openssl rand -hex 32
      API_TOKEN: ${API_TOKEN:?set API_TOKEN in .env}

      # Kinozal personal passkey (uk=...). Leave empty to disable kinozal worker.
      KINOZAL_UK: ${KINOZAL_UK:-}

      # ---- Batch sizes (scrape workers) ----
      RUTOR_BATCH_SIZE:  "300"
      NNM_BATCH_SIZE:    "300"
      PUBLIC_BATCH_SIZE: "500"

      # Max concurrent endpoint flows inside one public scrape pass
      # (~90 endpoints total — 32 keeps connections reasonable on a 1-2 vCPU box).
      PUBLIC_CONCURRENCY: "32"

      # Also run BEP 15 UDP announce + BEP 3 HTTP announce alongside scrape.
      # Announce returns peer lists (≤200 peers per reply) and authoritative
      # counts — heavier, but dramatically increases peer discovery for heavy
      # hashes. Enables BOTH UDP and HTTP announce layers. "0" to disable.
      PUBLIC_ANNOUNCE:    "1"

      # Auto-refresh of public tracker endpoint lists from ngosang/trackerslist.
      # Default 6h keeps the list fresh without hammering GitHub. Set to "0"
      # to disable external fetches and rely only on the bundled defaults.
      PUBLIC_REFRESH_INTERVAL: "6h"
      # Upstream URLs. Override to pin a fork or a self-hosted mirror.
      PUBLIC_REFRESH_URL_HTTP: "https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_all_http.txt"
      PUBLIC_REFRESH_URL_UDP:  "https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_all_udp.txt"

      # ---- DHT scraper (Mainline DHT get_peers + BEP 32 IPv6 + BEP 33 bloom-filter) ----
      DHT_BATCH_SIZE:     "100"   # hashes per tick
      DHT_CLIENTS:        "4"     # pool size: N independent sockets/node-ids querying in parallel
      DHT_CONCURRENCY:    "64"    # total concurrent ops across the pool
      DHT_ALPHA:          "8"     # Kademlia α parallelism per lookup
      DHT_LOOKUP_TIMEOUT: "12s"   # budget per (hash, client)

      # ---- Passive DHT node ("Sybil-lite") ----
      # Listens on a STABLE UDP port and answers incoming KRPC queries. Every
      # announce_peer that routes through us is persisted, which over time
      # yields a running snapshot of the public swarm. Requires the UDP port
      # below to be publicly reachable (see `ports:` section).
      DHT_PASSIVE_ENABLED:          "1"
      DHT_PASSIVE_PORT:             "6881"
      DHT_PASSIVE_PEER_TTL:         "30m"   # how long a cached peer counts as "fresh"
      DHT_PASSIVE_JANITOR_INTERVAL: "1h"    # janitor wake-up for stale-row deletion
      DHT_PASSIVE_MAX_PER_HASH:     "500"   # cap per-hash writes to bound table growth

      # ---- Rate limits per worker (requests/sec) ----
      KINOZAL_RPS:    "5"
      RUTRACKER_RPS:  "5"

      # ---- Tick intervals (how often the worker processes a chunk) ----
      SCRAPE_TICK:   "15s"     # scrape workers (batch) — 1 tick = 1 HTTP round-trip
      ANNOUNCE_TICK: "1s"      # announce workers — 1 tick = 1 hash

      # ---- Scheduling intervals per hash+tracker ----
      INTERVAL_ALIVE:     "30m"    # hash with seeders > 0
      INTERVAL_DEAD1:     "1h"     # first few zero-scrape rounds
      INTERVAL_DEAD2:     "6h"     # 3-10 consecutive zeros
      INTERVAL_DEAD_LONG: "24h"    # >10 consecutive zeros

      # ---- Timeouts ----
      TRACKER_TIMEOUT:   "15s"
      ON_DEMAND_TIMEOUT: "10s"
    ports:
      - "8080:8080"
      # CRITICAL: the passive DHT node only works if remote peers can send us
      # UDP datagrams. Without this mapping (or an equivalent firewall rule)
      # we will never be added to anyone's routing table and announce_peer
      # observations will stay at zero. Match DHT_PASSIVE_PORT above.
      - "6881:6881/udp"

volumes:
  pgdata:
